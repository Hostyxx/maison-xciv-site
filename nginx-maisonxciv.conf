# ─────────────────────────────────────────────────────────────────
#  Nginx — Configuration sécurisée Maison XCIV
#  Fichier à placer dans : /etc/nginx/sites-available/maisonxciv.com
#  Puis activer via : ln -s /etc/nginx/sites-available/maisonxciv.com \
#                               /etc/nginx/sites-enabled/maisonxciv.com
# ─────────────────────────────────────────────────────────────────

# ── Cache la version Nginx dans les headers ───────────────────
server_tokens off;

# ── Zones de rate limiting (définies dans le contexte http) ──
# À mettre dans /etc/nginx/nginx.conf → section http {}, ou ici si
# Nginx inclut ce fichier depuis le contexte http.
# Sinon, créer /etc/nginx/conf.d/rate-limit.conf avec ces lignes :
#
#   limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
#   limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
#   limit_req_zone $binary_remote_addr zone=global:10m rate=200r/m;
#   limit_conn_zone $binary_remote_addr zone=conn:10m;

# ── Redirection HTTP → HTTPS ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name maisonxciv.com www.maisonxciv.com;

    # ACME challenge Certbot (renouvellements automatiques)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://maisonxciv.com$request_uri;
    }
}

# ── Redirection www → non-www ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.maisonxciv.com;

    ssl_certificate     /etc/letsencrypt/live/maisonxciv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maisonxciv.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://maisonxciv.com$request_uri;
}

# ── Site principal HTTPS ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maisonxciv.com;

    # ── SSL (géré par Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/maisonxciv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maisonxciv.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS durci ─────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Headers de sécurité ───────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"          always;
    add_header X-Content-Type-Options     "nosniff"             always;
    add_header X-XSS-Protection           "1; mode=block"       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    # CSP : adapté au projet (Google Fonts + inline styles pour l'UI premium)
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-src 'none'; object-src 'none';" always;

    # ── Taille max upload (images montres) ────────────────────
    client_max_body_size 10M;

    # ── Timeout et buffer anti-slowloris ─────────────────────
    client_body_timeout   12s;
    client_header_timeout 12s;
    keepalive_timeout     15s;
    send_timeout          10s;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/maisonxciv-access.log;
    error_log  /var/log/nginx/maisonxciv-error.log warn;

    # ── Connexions simultanées max par IP ────────────────────
    limit_conn conn 20;

    # ── Bloquer les user agents suspects ─────────────────────
    if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|zgrab|nuclei)) {
        return 444;
    }

    # ── Rate limiting sur les endpoints auth ─────────────────
    location ~ ^/api/(auth|user/login|user/register) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Rate limiting sur l'API générale ─────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Cache agressif pour les fichiers statiques ────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|avif|webp|jpg|jpeg|png|gif)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        expires    30d;
        add_header Cache-Control "public, immutable";
        # Répéter les security headers car add_header n'hérite pas dans les blocs enfants
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
    }

    # ── Proxy vers Node.js (toutes les autres requêtes) ───────
    location / {
        limit_req zone=global burst=50 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }
}
