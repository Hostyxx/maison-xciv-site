<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Créer un compte — Maison XCIV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Jost:wght@200;300;400;500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="auth-page">

  <!-- Panneau visuel gauche -->
  <div class="auth-visual">
    <div class="auth-visual-logo">
      <div class="auth-logo-eyebrow">Maison</div>
      <div class="auth-logo-main">XCIV</div>
    </div>
    <div class="auth-visual-body">
      <h1 class="auth-visual-title">
        Rejoignez<br>
        <em>la Maison</em>
      </h1>
      <p class="auth-visual-desc">
        Créez votre espace personnel pour sauvegarder vos pièces favorites et accéder à notre collection de prestige.
      </p>
    </div>
    <div class="auth-visual-footer">
      Maison XCIV · Collection Horlogère
    </div>
  </div>

  <!-- Formulaire inscription -->
  <div class="auth-form-side">
    <div class="auth-form-wrap">

      <h2 class="auth-form-title">Créer un compte</h2>
      <p class="auth-form-subtitle">Rejoignez la communauté Maison XCIV</p>

      <div class="auth-message" id="authMsg"></div>

      <form id="registerForm" method="post" novalidate>

        <div class="auth-field">
          <label for="name">Prénom et nom</label>
          <input type="text" id="name" placeholder="Jean Dupont" autocomplete="name" required>
        </div>

        <div class="auth-field">
          <label for="email">Adresse email</label>
          <input type="email" id="email" placeholder="vous@email.com" autocomplete="email" required>
        </div>

        <div class="auth-field">
          <label for="password">Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="8 caractères minimum" autocomplete="new-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('password')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="auth-field">
          <label for="confirm">Confirmer le mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('confirm')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn" id="submitBtn">
          <span id="btnText">Créer mon compte</span>
          <div class="auth-btn-spinner" id="btnSpinner"></div>
        </button>

      </form>

      <div class="auth-alt">
        Déjà un compte ? <a href="/connexion">Se connecter</a>
      </div>

      <a href="/" class="auth-back">← Retour au site</a>

    </div>
  </div>

</div>
<script src="register.js"></script>
</body>
</html>
